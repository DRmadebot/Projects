<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6355"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#ffffff"/>

  <!-- Wikipedia API -->
  <rect x="40" y="40" width="200" height="70" rx="12" fill="#fdf6e3" stroke="#c9a24b" stroke-width="2"/>
  <text x="140" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#3a3226">Wikipedia API</text>
  <text x="140" y="90" text-anchor="middle" font-size="11" fill="#7a715f">batched + fallback fetch</text>

  <!-- services/wikipedia.ts -->
  <rect x="330" y="40" width="220" height="70" rx="12" fill="#eef3ea" stroke="#7a9a6b" stroke-width="2"/>
  <text x="440" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#334028">services/wikipedia.ts</text>
  <text x="440" y="90" text-anchor="middle" font-size="11" fill="#5c6b4e">fetches &amp; normalizes articles</text>

  <!-- services/feed.ts -->
  <rect x="330" y="160" width="220" height="80" rx="12" fill="#eef3ea" stroke="#7a9a6b" stroke-width="2"/>
  <text x="440" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#334028">services/feed.ts</text>
  <text x="440" y="208" text-anchor="middle" font-size="11" fill="#5c6b4e">checks cache, dedupes,</text>
  <text x="440" y="222" text-anchor="middle" font-size="11" fill="#5c6b4e">paginates buffer</text>

  <!-- SQLite -->
  <rect x="620" y="140" width="220" height="120" rx="12" fill="#fbeee6" stroke="#c9784b" stroke-width="2"/>
  <text x="730" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#4a2c1c">SQLite (tangent.db)</text>
  <text x="730" y="192" text-anchor="middle" font-size="11" fill="#7a5940">articles — 7-day / 5,000 cap</text>
  <text x="730" y="210" text-anchor="middle" font-size="11" fill="#7a5940">bookmarks — kept forever</text>
  <text x="730" y="228" text-anchor="middle" font-size="11" fill="#7a5940">unique index on pageid</text>

  <!-- Home Feed -->
  <rect x="40" y="330" width="180" height="90" rx="12" fill="#eef2fb" stroke="#5b7ab8" stroke-width="2"/>
  <text x="130" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#26324a">Home Feed</text>
  <text x="130" y="380" text-anchor="middle" font-size="11" fill="#4c5f83">infinite scroll +</text>
  <text x="130" y="396" text-anchor="middle" font-size="11" fill="#4c5f83">prefetch buffer</text>

  <!-- Search -->
  <rect x="255" y="330" width="180" height="90" rx="12" fill="#eef2fb" stroke="#5b7ab8" stroke-width="2"/>
  <text x="345" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#26324a">Search bar</text>
  <text x="345" y="380" text-anchor="middle" font-size="11" fill="#4c5f83">title search over</text>
  <text x="345" y="396" text-anchor="middle" font-size="11" fill="#4c5f83">the local cache</text>

  <!-- Bookmarks tab -->
  <rect x="470" y="330" width="180" height="90" rx="12" fill="#eef2fb" stroke="#5b7ab8" stroke-width="2"/>
  <text x="560" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#26324a">Bookmarks tab</text>
  <text x="560" y="380" text-anchor="middle" font-size="11" fill="#4c5f83">saved articles,</text>
  <text x="560" y="396" text-anchor="middle" font-size="11" fill="#4c5f83">independent of cache</text>

  <!-- Debug screen -->
  <rect x="685" y="330" width="175" height="90" rx="12" fill="#f5f0f5" stroke="#8a6b99" stroke-width="2"/>
  <text x="772" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2e46">Debug screen</text>
  <text x="772" y="380" text-anchor="middle" font-size="11" fill="#6b5876">dev-only, __DEV__</text>
  <text x="772" y="396" text-anchor="middle" font-size="11" fill="#6b5876">gated</text>

  <!-- arrows -->
  <line x1="240" y1="75" x2="325" y2="75" stroke="#6b6355" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="110" x2="440" y2="155" stroke="#6b6355" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="200" x2="615" y2="200" stroke="#6b6355" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="130" y1="330" x2="400" y2="245" stroke="#6b6355" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="345" y1="330" x2="420" y2="245" stroke="#6b6355" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="560" y1="330" x2="670" y2="260" stroke="#6b6355" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="772" y1="330" x2="700" y2="260" stroke="#6b6355" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
